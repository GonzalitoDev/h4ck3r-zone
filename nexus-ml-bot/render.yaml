services:
  - type: web
    name: nexus-ml-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: BOT_PREFIX
        value: "!"
      - key: PORT
        value: "8080"
